version: 2
before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/wc2api
    binary: wc2api
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

release:
  github:
    owner: hypertun
    name: WC2OpenAPI

changelog:
  sort: asc
